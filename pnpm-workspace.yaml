# Windowsのローカルネイティブビルド（CMake/ninja）はsymlink＋長い.pnpmパスで壊れるため実体フラット配置に
nodeLinker: hoisted
allowBuilds:
  esbuild: true
minimumReleaseAgeExclude:
  - '@expo/cli@57.0.5 || 57.0.6 || 57.0.10'
  - '@expo/config-plugins@57.0.3 || 57.0.6'
  - '@expo/fingerprint@0.20.3 || 0.20.6'
  - '@expo/inline-modules@0.1.2'
  - '@expo/prebuild-config@57.0.5 || 57.0.9'
  - '@expo/router-server@57.0.2 || 57.0.4'
  - babel-preset-expo@57.0.2 || 57.0.4
  - expo-modules-autolinking@57.0.5 || 57.0.9
  - expo@57.0.3 || 57.0.4 || 57.0.8
  - '@expo/config@57.0.3 || 57.0.6'
  - expo-modules-core@57.0.3 || 57.0.7
  - expo-modules-jsi@57.0.1 || 57.0.4
  - '@expo/image-utils@0.11.4'
  - '@expo/metro-config@57.0.7'
  - '@expo/require-utils@57.0.4'
  - expo-asset@57.0.7
  - expo-constants@57.0.7
  - expo-build-properties@57.0.7
  - expo-notifications@57.0.7
  - expo-sharing@57.0.7
  - expo-splash-screen@57.0.5
patchedDependencies:
  react-native-webview@13.16.1: patches/react-native-webview@13.16.1.patch
