# Windowsのローカルネイティブビルド（CMake/ninja）はsymlink＋長い.pnpmパスで壊れるため実体フラット配置に
nodeLinker: hoisted
allowBuilds:
  esbuild: true
minimumReleaseAgeExclude:
  - '@expo/cli@57.0.5 || 57.0.6'
  - '@expo/config-plugins@57.0.3'
  - '@expo/fingerprint@0.20.3'
  - '@expo/inline-modules@0.1.2'
  - '@expo/prebuild-config@57.0.5'
  - '@expo/router-server@57.0.2'
  - babel-preset-expo@57.0.2
  - expo-modules-autolinking@57.0.5
  - expo@57.0.3 || 57.0.4
  - '@expo/config@57.0.3'
  - expo-modules-core@57.0.3
  - expo-modules-jsi@57.0.1
patchedDependencies:
  react-native-webview@13.16.1: patches/react-native-webview@13.16.1.patch
